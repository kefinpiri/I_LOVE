
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Heart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #030326;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <script>

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();

        const texts = [];
        const phrase = "I Love You";

        // ==============================
        // RESPONSIVE SIZE
        // ==============================

        const isMobile = window.innerWidth < 768;

        // LOVE LEBIH KECIL
        const heartSize = isMobile ? 9 : 12;

        // FONT RESPONSIVE
        const fontSize = isMobile ? 10 : 12;

        // GERAK RESPONSIVE
        const radius = isMobile ? 2 : 3;

        // ==============================
        // MEMBUAT BENTUK LOVE
        // ==============================

        for (let t = 0; t < Math.PI * 2; t += 0.06) {

            let x = 16 * Math.pow(Math.sin(t), 3);

            let y =
                13 * Math.cos(t)
                - 5 * Math.cos(2 * t)
                - 2 * Math.cos(3 * t)
                - Math.cos(4 * t);

            x *= heartSize;
            y *= heartSize;

            texts.push({
                baseX: x,
                baseY: -y,
                angle: Math.random() * Math.PI * 2
            });

        }

        // ==============================
        // ANIMASI
        // ==============================

        function animate() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();

            ctx.translate(canvas.width / 2, canvas.height / 2);

            texts.forEach((p) => {

                p.angle += 0.03;

                let offsetX =
                    Math.cos(p.angle) * radius;

                let offsetY =
                    Math.sin(p.angle) * radius;

                let x = p.baseX + offsetX;
                let y = p.baseY + offsetY;

                ctx.save();

                ctx.translate(x, y);

                // WARNA
                ctx.fillStyle = "#ff9ac2";

                // GLOW
                ctx.shadowColor = "#ff9ac2";
                ctx.shadowBlur = 12;

                // FONT RESPONSIVE
                ctx.font = `bold ${fontSize}px Arial`;

                ctx.fillText(phrase, 0, 0);

                ctx.restore();

            });

            ctx.restore();

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener("resize", () => {
            resizeCanvas();
        });

    </script>

</body>

</html>
