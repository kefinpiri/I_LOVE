```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Heart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #030326;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <script>

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const texts = [];
        const phrase = "I Love You";

        // =================================
        // MEMBUAT BENTUK LOVE
        // =================================

        for (let t = 0; t < Math.PI * 2; t += 0.06) {

            let x = 16 * Math.pow(Math.sin(t), 3);

            let y =
                13 * Math.cos(t)
                - 5 * Math.cos(2 * t)
                - 2 * Math.cos(3 * t)
                - Math.cos(4 * t);

            // UKURAN LOVE DIPERKECIL
            x *= 14;
            y *= 14;

            texts.push({
                baseX: x,
                baseY: -y,
                angle: Math.random() * Math.PI * 2
            });

        }

        // =================================
        // ANIMASI
        // =================================

        function animate() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();

            ctx.translate(canvas.width / 2, canvas.height / 2);

            texts.forEach((p) => {

                // GERAK MELINGKAR
                p.angle += 0.03;

                // RADIUS PUTARAN
                let radius = 4;

                // TEKS BERPUTAR
                let offsetX = Math.cos(p.angle) * radius;
                let offsetY = Math.sin(p.angle) * radius;

                // POSISI LOVE TETAP
                let x = p.baseX + offsetX;
                let y = p.baseY + offsetY;

                ctx.save();

                ctx.translate(x, y);

                // WARNA
                ctx.fillStyle = "#ff9ac2";

                // GLOW
                ctx.shadowColor = "#ff9ac2";
                ctx.shadowBlur = 15;

                // UKURAN TEKS DIPERKECIL
                ctx.font = "bold 14px Arial";

                ctx.fillText(phrase, 0, 0);

                ctx.restore();

            });

            ctx.restore();

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener("resize", () => {

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        });

    </script>

</body>

</html>
```
